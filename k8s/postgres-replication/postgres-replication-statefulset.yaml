apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: pawid
  labels:
    app: postgres-replica
    role: replica
spec:
  serviceName: postgres-replica-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica
  template:
    metadata:
      labels:
        app: postgres-replica
        role: replica
    spec:
      initContainers:
        # Чека primary да е готов пред да стартува replica
        - name: wait-for-primary
          image: postgres:16
          command:
            - sh
            - -c
            - |
              until pg_isready \
                -h postgres-service.pawid.svc.cluster.local \
                -p 5432 \
                -U pawid; do
                echo "Waiting for primary postgres...";
                sleep 5;
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pawid-secret
                  key: DB_PASSWORD

      containers:
        - name: postgres-replica
          image: postgres:16
          command: ["/bin/bash", "/scripts/init-replica.sh"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: pawid-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: pawid-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pawid-secret
                  key: DB_PASSWORD
            - name: REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pawid-secret
                  key: REPLICATION_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data
          volumeMounts:
            - name: postgres-replica-storage
              mountPath: /var/lib/postgresql/data
            - name: replication-scripts
              mountPath: /scripts
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "pawid", "-d", "pawid"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "pawid", "-d", "pawid"]
            initialDelaySeconds: 60
            periodSeconds: 20

      volumes:
        - name: replication-scripts
          configMap:
            name: postgres-replication-config
            defaultMode: 0755

  volumeClaimTemplates:
    - metadata:
        name: postgres-replica-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
