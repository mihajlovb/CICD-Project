apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pawid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: mihajlovb/pawid-frontend:c0614255d4cf1f753ee292d71faf31d35ebe33cd
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5