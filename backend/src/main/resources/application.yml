server:
  port: 8080

spring:
  application:
    name: pawid-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pawid}
    username: ${DB_USER:pawid}
    password: ${DB_PASSWORD:pawid}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

pawid:
  uploads-dir: ${UPLOADS_DIR:./uploads}
  cors-allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000