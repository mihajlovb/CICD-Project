name: CI/CD — Build, Push and Deploy (Argo CD GitOps)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build и push на backend Docker image
  # ─────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        working-directory: backend
        run: mvn package -DskipTests -q

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/pawid-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/pawid-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build и push на frontend Docker image
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular app
        working-directory: frontend
        run: npm run build -- --configuration production --output-path=dist/pawid

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/pawid-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/pawid-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 (CD): Update image tags во k8s манифестите и push кон git
  #             Argo CD го детектира промената и автоматски ја деплоира
  #             новата верзија на кластерот (GitOps).
  #
  #             Ова job се извршува само на push кон main (не на PR).
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy — Update k8s manifests (GitOps)
    runs-on: ubuntu-latest
    needs: [ build-backend, build-frontend ]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Потребен е PAT (Personal Access Token) наместо GITHUB_TOKEN
          # за да може Actions да прави push назад кон репото.
          # Додади го ACTIONS_PAT во GitHub Secrets.
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update backend image tag in k8s manifest
        run: |
          # Го заменува image тагот со точниот SHA на commit-от
          # На тој начин Argo CD знае дека треба да деплоира нова верзија
          sed -i "s|image: ${{ env.DOCKERHUB_USERNAME }}/pawid-backend:.*|image: ${{ env.DOCKERHUB_USERNAME }}/pawid-backend:${{ github.sha }}|g" \
            k8s/backend-deployment.yaml

      - name: Update frontend image tag in k8s manifest
        run: |
          sed -i "s|image: ${{ env.DOCKERHUB_USERNAME }}/pawid-frontend:.*|image: ${{ env.DOCKERHUB_USERNAME }}/pawid-frontend:${{ github.sha }}|g" \
            k8s/frontend-deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git add k8s/backend-deployment.yaml k8s/frontend-deployment.yaml

          # Commit само ако има реална промена (избегнува празни commits)
          if git diff --cached --quiet; then
            echo "No changes to commit — manifests already up to date."
          else
            git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
            git push
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Summary — прикажува статус на сите jobs
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [ build-backend, build-frontend, deploy ]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## PawID CI/CD Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Backend  | ${{ needs.build-backend.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy (GitOps)| ${{ needs.deploy.result }}         |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Argo CD ќе ја синхронизира апликацијата автоматски." >> $GITHUB_STEP_SUMMARY
