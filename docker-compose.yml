services:

  # ─────────────────────────────────────────
  # PostgreSQL database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: pawid-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pawid-network

  # ─────────────────────────────────────────
  # Spring Boot backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pawid-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawid-network

  # ─────────────────────────────────────────
  # Angular frontend (served by nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pawid-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pawid-network

# ─────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  uploads_data:

# ─────────────────────────────────────────
# Internal network
# ─────────────────────────────────────────
networks:
  pawid-network:
    driver: bridge